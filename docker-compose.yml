services:
  debmatic-mcp:
    build: .
    restart: unless-stopped
    volumes:
      - debmatic-data:/data
    ports:
      - "3000:3000"
    environment:
      # === Required ===
      - CCU_HOST=192.168.x.x
      - CCU_PASSWORD=secret

      # === CCU connection (optional, defaults shown) ===
      # - CCU_PORT=80
      # - CCU_HTTPS=false
      # - CCU_USER=Admin

      # === MCP transport (optional) ===
      # - MCP_TRANSPORT=http
      # - MCP_PORT=3000
      # - MCP_AUTH_TOKEN=           # auto-generated if unset

      # === Cache (optional) ===
      # - CACHE_DIR=/data
      # - CACHE_TTL=86400

      # === Rate limiting (optional) ===
      # - CCU_RATE_LIMIT_BURST=20
      # - CCU_RATE_LIMIT_RATE=10

      # === Resource polling (optional) ===
      # - RESOURCE_POLL_INTERVAL=60

      # === Logging (optional) ===
      # - LOG_LEVEL=info

volumes:
  debmatic-data:
